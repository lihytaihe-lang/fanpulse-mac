name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build and test
        run: swift test

      - name: Check shell scripts
        run: |
          zsh -n boost.sh
          zsh -n boost10.command
          zsh -n boost-custom.command
          zsh -n boost20.sh
          zsh -n restore-fans.sh
          zsh -n restore-fans.command
          zsh -n scripts/package-portable.sh

      - name: Build portable package
        run: zsh ./scripts/package-portable.sh

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: fanpulse-portable
          path: dist/fanpulse-portable.zip
          if-no-files-found: error
